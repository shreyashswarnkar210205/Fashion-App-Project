<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        body {
            font-family: Arial;
            background: #000;
            color: white;
            margin: 0;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            background: #ff3f6c;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 30px;
        }

        /* Search bar */
        .search-box {
            margin: 20px 0;
        }

        .search-box input {
            padding: 12px;
            width: 40%;
            border-radius: 25px;
            border: none;
        }

        .search-box button {
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            background: #ff3f6c;
            color: white;
        }

        /* Drama cards */
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px 40px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            min-width: 250px;
        }

        .card:hover {
            background: #333;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="/">Home</a>
    <a href="/cart/">Cart</a>
    <a href="/wishlist/">Wishlist</a>
</div>

<h1>Welcome to KStyleCloset 🌻</h1>

<!-- ✅ SEARCH BAR -->
<div class="search-box">
    <form method="GET" action="">
        <input type="text" placeholder="Search dramas...">
        <button type="submit">Search</button>
    </form>
</div>

<!-- ✅ DRAMA CARDS (BACK TO NORMAL) -->
<div class="container">

    <a href="/category/My Demon/" class="card">🎬 My Demon</a>

    <a href="/category/Queen of Tears/" class="card">🎬 Queen of Tears</a>

    <a href="/category/Business Proposal/" class="card">🎬 Business Proposal</a>

    <a href="/category/Its Okay Not To Be Okay/" class="card">🎬 Its Okay Not To Be Okay</a>

    <a href="/category/When The Phone Rings/" class="card">🎬 When The Phone Rings</a>

    <a href="/category/Crash Landing On You/" class="card">🎬 Crash Landing On You</a>

    <a href="/category/Can This Love Be Translated/" class="card">🎬 Can This Love Be Translated</a>

</div>

</body>
</html>
