<!DOCTYPE html>
<html>
<head>
    <title>Category</title>

    <!-- YEH STYLE SECTION HAI -->
    <style>
        body {
            font-family: Arial;
            background: #f9f9f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .price {
            color: red;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 8px;
            margin: 5px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .buy { background: orange; }
        .cart { background: pink; }
        .wishlist { background: gray; }

    </style>
</head>

<body>

<h2>{{ category_name }}</h2>

<form method="GET" style="text-align:center; margin-bottom:20px;">
    <input type="text" name="search" placeholder="Search in this drama..."
           style="padding:10px; width:50%; border-radius:20px;">
    
    <button type="submit">Search</button>
</form>

<div class="container">

{% for product in products %}
<div class="card">

    <img src="{{ product.image.url }}">

    <h3>{{ product.name }}</h3>

    <p class="price">₹{{ product.price }}</p>

    
    <a href="/add-to-cart/{{ product.id }}/" class="btn cart">Add to Cart</a>
    <a href="/wishlist/{{ product.id }}/" class="btn wishlist">Wishlist</a>

</div>
{% endfor %}

</div>

</body>
</html>
