<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body { font-family: Arial; padding: 20px; }

        .box {
            display: flex;
            gap: 40px;
        }

        img {
            width: 300px;
            height: 350px;
            object-fit: cover;
        }

        .btn {
            display: block;
            padding: 10px;
            background: #ff3f6c;
            color: white;
            margin-top: 10px;
            text-decoration: none;
            width: 150px;
            text-align: center;
        }
    </style>
</head>

<body>

<h2>{{ product.name }}</h2>

<div class="box">
    <img src="{{ product.image.url }}">

    <div>
        <h3>₹{{ product.price }}</h3>
        <p>K-Drama: {{ product.drama_name }}</p>

        <a href="/add-to-cart/{{ product.id }}/" class="btn">Add to Cart</a>
        <a href="/add-to-wishlist/{{ product.id }}/" class="btn">Wishlist</a>
        <a href="/add-to-cart/{{ product.id }}/" class="btn">Buy Now ⚡</a>
    </div>
</div>

<a href="/">⬅ Back</a>

</body>
</html>
