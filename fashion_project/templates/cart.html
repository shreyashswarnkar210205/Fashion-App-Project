<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body { font-family: Arial; padding: 20px; }

        .item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
        }

        img {
            width: 100px;
        }

        .qty a {
            padding: 5px 10px;
            background: black;
            color: white;
            text-decoration: none;
            margin: 5px;
        }

        .buy-btn {
            background: green;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>Your Cart 🛒</h2>

{% for item in cart_items %}
<div class="item">

    <img src="{{ item.product.image.url }}">

    <h3>{{ item.product.name }}</h3>

    <p>Price: ₹{{ item.product.price }}</p>

    <div class="qty">
        <a href="/decrease/{{ item.product.id }}/">➖</a>
        {{ item.quantity }}
        <a href="/increase/{{ item.product.id }}/">➕</a>
    </div>

</div>
{% endfor %}

<h3>Total: ₹{{ total }}</h3>

<a href="/checkout/" class="buy-btn">Buy Now</a>

</body>
</html>
